  <script>
    (function () {
      function getCookie(name) {
        var value = "; " + document.cookie;
        var parts = value.split("; " + name + "=");
        if (parts.length === 2) return parts.pop().split(";").shift();
        return null;
      }
      var theme = getCookie('theme') || 'system';
      if (theme === 'black' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <script>
    window.dataLayer = window.dataLayer || [];
    window.gtag = window.gtag || function () { window.dataLayer.push(arguments); };

    // Configure Consent Mode Defaults dynamically based on localStorage
    (function () {
      var consentVal = localStorage.getItem('cookie-consent');
      var consentState = 'denied';
      if (consentVal) {
        try {
          var parsed = JSON.parse(consentVal);
          if (parsed && parsed.analytics === true) {
            consentState = 'granted';
          }
        } catch (e) {
          if (consentVal === 'accepted') {
            consentState = 'granted';
          }
        }
      }
      window.gtag('consent', 'default', {
        'ad_storage': consentState,
        'ad_user_data': consentState,
        'ad_personalization': consentState,
        'analytics_storage': consentState
      });
    })();
  </script>
